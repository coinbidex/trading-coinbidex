name: coinbidex-demo

services:
  postgres-demo:
    image: postgres:16-alpine
    container_name: cb_demo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cb_demo
      POSTGRES_PASSWORD: cb_demo_pass
      POSTGRES_DB: cb_demo_db
    volumes:
      - demo_pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cb_demo -d cb_demo_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Exposed only for local dev debugging
    ports: ["5433:5432"]

  redis-demo:
    image: redis:7-alpine
    container_name: cb_demo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - demo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports: ["6380:6379"]

  backend-demo:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cb_demo_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4001
      PLATFORM_MODE: demo
      DATABASE_URL: postgresql://cb_demo:cb_demo_pass@postgres-demo:5432/cb_demo_db
      REDIS_URL: redis://redis-demo:6379
      JWT_SECRET: demo_jwt_not_for_production_abc123xyz
      JWT_REFRESH_SECRET: demo_refresh_not_for_production_def456uvw
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000,http://localhost:5173
      APP_NAME: "Coinbidex DEMO"
      # No real API keys in demo — everything simulated
      ONEINCH_API_KEY: ""
      REFERRAL_WALLET_ADDRESS: ""
      SWAP_MARKUP_PCT: "0.3"
      MOONPAY_PUBLISHABLE_KEY: ""
      SMTP_HOST: ""
      ETH_RPC_URL: "https://cloudflare-eth.com"
      POLY_RPC_URL: "https://polygon-rpc.com"
      BSC_RPC_URL: "https://bsc-dataseed.binance.org"
    ports: ["4001:4001"]
    depends_on:
      postgres-demo:
        condition: service_healthy
      redis-demo:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src  # hot reload

  frontend-demo:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PLATFORM_MODE: demo
        VITE_APP_TITLE: "Coinbidex — Demo"
        VITE_DEMO_BANNER: "true"
        VITE_API_BASE: "http://localhost:4001"
        VITE_DEMO_URL: "http://localhost:3001"
        VITE_LIVE_URL: "http://localhost:3000"
    container_name: cb_demo_frontend
    restart: unless-stopped
    ports: ["3001:3000"]
    depends_on:
      - backend-demo

volumes:
  demo_pg_data:
  demo_redis_data:
