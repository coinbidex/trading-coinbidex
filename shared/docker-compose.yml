# Shared infrastructure — not tied to any single project.
# Currently: pgAdmin, giving you one web UI (db.coinbidex.com) to browse
# both the live and staging Postgres databases side by side.
#
# This directory is NOT part of the git repo checkouts — it's created once
# directly on the VPS (see deploy/vps-setup.sh) and lives at
# /var/www/coinbidex/shared, alongside (not inside) the two project folders.
#
# pgAdmin joins both projects' Docker networks directly and talks to
# Postgres by container name (postgres-live / postgres-staging) — neither
# database is ever published to the host's network at all, not even on
# 127.0.0.1. This is more secure than the host-port approach it replaces,
# and also just works, unlike routing through host.docker.internal to a
# port that's bound to the host's loopback only (that path silently times
# out — loopback-bound ports aren't reachable from the Docker bridge).

name: coinbidex-shared

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cb_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      # Preloads the Live + Staging server connections below on first boot
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "127.0.0.1:5050:80"   # loopback only — nginx proxies db.coinbidex.com to this
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - coinbidex-live-net
      - coinbidex-staging-net

networks:
  coinbidex-live-net:
    external: true   # created by ../trading-coinbidex/docker-compose.prod.yml
  coinbidex-staging-net:
    external: true   # created by ../staging-trading-coinbidex/docker-compose.staging.yml

volumes:
  pgadmin_data:
